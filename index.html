<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#08050f" />
  <title>The Woods After Dark</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <img class="map-backdrop" src="assets/woods-map.png" alt="The Woods campground map background" />
    <div class="backdrop-scrim" aria-hidden="true"></div>

    <section class="find-card" aria-labelledby="appTitle">
      <header class="hero">
        <p class="eyebrow">The Woods · After Dark</p>
        <h1 id="appTitle">Where are we going?</h1>
        <p class="hero-copy">Find a site, cabin, bathhouse, or POI. Tap <strong>Go</strong> and your maps app opens.</p>
      </header>

      <form id="findForm" class="find-form" autocomplete="off">
        <label class="sr-only" for="searchInput">Find a destination</label>
        <div class="search-row">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" name="q" type="search" inputmode="search" placeholder="Site 36, G12, F26, bathhouse" autofocus />
          <button id="clearButton" type="button" aria-label="Clear search">×</button>
        </div>
        <button class="primary-go" type="submit">Find</button>
      </form>

      <div class="quick-row" aria-label="Quick searches">
        <button type="button" data-query="125">125</button>
        <button type="button" data-query="bathhouse">Bathhouse</button>
        <button type="button" data-query="parking">Parking</button>
        <button type="button" data-shortcut="groveParking">Grove Parking</button>
      </div>

      <div id="resultSummary" class="summary" role="status" aria-live="polite">Start with a site number or destination name.</div>
      <div id="results" class="results" aria-label="Search results"></div>
    </section>

    <footer class="utility-bar" aria-label="Utility actions">
      <button id="paperMapButton" type="button">Paper map</button>
      <button id="discreetButton" type="button" aria-pressed="false">Boring mode</button>
    </footer>

    <div id="paperMapOverlay" class="paper-overlay" hidden>
      <section class="paper-panel" role="dialog" aria-modal="true" aria-labelledby="paperTitle">
        <header>
          <div>
            <p class="eyebrow">Reference only</p>
            <h2 id="paperTitle">Paper map</h2>
          </div>
          <button id="paperCloseButton" type="button" aria-label="Close paper map">×</button>
        </header>
        <div class="paper-scroll">
          <img src="assets/woods-map.png" alt="Printed campground map reference" />
        </div>
      </section>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
